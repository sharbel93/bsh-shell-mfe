<div class="frame">
  <header class="topbar">
    <button class="icon-btn waffle" aria-label="Apps">
      <svg viewBox="0 0 20 20" width="18" height="18"><g fill="currentColor">
        <rect x="2" y="2" width="4" height="4" rx="1"/><rect x="8" y="2" width="4" height="4" rx="1"/><rect x="14" y="2" width="4" height="4" rx="1"/>
        <rect x="2" y="8" width="4" height="4" rx="1"/><rect x="8" y="8" width="4" height="4" rx="1"/><rect x="14" y="8" width="4" height="4" rx="1"/>
        <rect x="2" y="14" width="4" height="4" rx="1"/><rect x="8" y="14" width="4" height="4" rx="1"/><rect x="14" y="14" width="4" height="4" rx="1"/>
      </g></svg>
    </button>
    <span class="brand">{{ workspace }}</span>
    <div class="search"><input type="text" placeholder="Search" aria-label="Search" /></div>
    <div class="spacer"></div>
    <span class="avatar" aria-hidden="true">S</span>
  </header>

  <div class="body">
    <nav class="rail" aria-label="Apps">
      <a class="rail__item" routerLink="/mail" routerLinkActive="active" aria-label="Mail">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
        </svg>
        <span>Mail</span>
      </a>
      <a class="rail__item" routerLink="/calendar" routerLinkActive="active" aria-label="Calendar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>
        </svg>
        <span>Calendar</span>
      </a>
    </nav>

    <main class="content"><router-outlet /></main>
  </div>
</div>
